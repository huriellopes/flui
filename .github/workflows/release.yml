name: Release do App

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend'
      - '.github/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cria release do app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="app-v${VERSION}-build.${{ github.run_number }}"
          gh release create "$TAG" \
            --title "App v${VERSION} (build ${{ github.run_number }})" \
            --target "${{ github.sha }}" \
            --generate-notes
          echo "Release $TAG criada. APK do build correspondente no EAS:" >> "$GITHUB_STEP_SUMMARY"
          echo "https://expo.dev/accounts/huriellopes/projects/app-notify-water-health/builds" >> "$GITHUB_STEP_SUMMARY"
